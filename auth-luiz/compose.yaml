services:
  db:
    image: postgres:16-alpine
    container_name: authluiz-db
    environment:
      POSTGRES_DB: authluiz
      POSTGRES_USER: authluiz
      POSTGRES_PASSWORD: authluiz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authluiz -d authluiz"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: authluiz-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/authluiz
      SPRING_DATASOURCE_USERNAME: authluiz
      SPRING_DATASOURCE_PASSWORD: authluiz
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: authluiz-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
