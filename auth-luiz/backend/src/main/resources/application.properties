spring.config.import=optional:file:./.env[.properties]

spring.application.name=authluiz

spring.docker.compose.file=../compose-dev.yaml
spring.docker.compose.lifecycle-management=start-only

server.port=8080
server.forward-headers-strategy=none

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.rsa.private-key=${JWT_RSA_PRIVATE_KEY}
jwt.rsa.public-key=${JWT_RSA_PUBLIC_KEY}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

app.setup.master-key=${APP_SETUP_MASTER_KEY}

google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}

perm.luiz.url=${PERM_LUIZ_URL:}

auth.service.key=${AUTH_LUIZ_SERVICE_KEY:}

auditoria.atividade=${AUDITORIA_ATIVIDADE:true}
auditoria.retencao-dias=${AUDITORIA_RETENCAO_DIAS:90}