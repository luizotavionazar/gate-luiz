server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — required so proxy_pass resolves service names
    # at request time instead of at nginx startup (avoids startup failure when
    # the backend container isn't ready yet).
    resolver 127.0.0.11 valid=30s ipv6=off;

    add_header Cross-Origin-Opener-Policy "unsafe-none" always;

    location /auth/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect trailing-slash setup URL to the SPA route (no trailing slash)
    location = /setup/ {
        return 301 /setup;
    }

    location /setup/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
