spring.config.import=optional:file:./.env[.properties]

spring.application.name=permluiz

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# URI do endpoint JWKS do Auth-Luiz para validação dos JWTs
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_LUIZ_JWKS_URI}

# Integração server-to-server com o Auth-Luiz
auth.luiz.base-url=${AUTH_LUIZ_BASE_URL}
auth.luiz.service-key=${AUTH_LUIZ_SERVICE_KEY}

auditoria.atividade=${AUDITORIA_ATIVIDADE:true}
auditoria.retencao-dias=${AUDITORIA_RETENCAO_DIAS:90}

spring.jackson.time-zone=America/Sao_Paulo
