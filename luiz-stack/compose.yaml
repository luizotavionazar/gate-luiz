services:
  # ── Auth-Luiz ──────────────────────────────────────────────────────────────
  authluiz-db:
    image: postgres:16-alpine
    container_name: authluiz-db
    environment:
      POSTGRES_DB: authluiz
      POSTGRES_USER: ${AUTHLUIZ_DB_USER:-authluiz}
      POSTGRES_PASSWORD: ${AUTHLUIZ_DB_PASSWORD:-authluiz}
    volumes:
      - authluiz-pgdata:/var/lib/postgresql/data
    networks: [luiz-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHLUIZ_DB_USER:-authluiz} -d authluiz"]
      interval: 5s
      timeout: 3s
      retries: 20

  authluiz-backend:
    build:
      context: ../auth-luiz/backend
    container_name: authluiz-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://authluiz-db:5432/authluiz
      SPRING_DATASOURCE_USERNAME: ${AUTHLUIZ_DB_USER:-authluiz}
      SPRING_DATASOURCE_PASSWORD: ${AUTHLUIZ_DB_PASSWORD:-authluiz}
      JWT_RSA_PRIVATE_KEY: ${JWT_RSA_PRIVATE_KEY}
      JWT_RSA_PUBLIC_KEY: ${JWT_RSA_PUBLIC_KEY}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      APP_SETUP_MASTER_KEY: ${AUTHLUIZ_SETUP_MASTER_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
    ports:
      - "8080:8080"
    depends_on:
      authluiz-db:
        condition: service_healthy
    networks: [luiz-network]

  authluiz-frontend:
    build:
      context: ../auth-luiz/frontend
    container_name: authluiz-frontend
    ports:
      - "80:80"
    depends_on:
      - authluiz-backend
    networks: [luiz-network]

  # ── Perm-Luiz ──────────────────────────────────────────────────────────────
  permluiz-db:
    image: postgres:16-alpine
    container_name: permluiz-db
    environment:
      POSTGRES_DB: permluiz
      POSTGRES_USER: ${PERMLUIZ_DB_USER:-permluiz}
      POSTGRES_PASSWORD: ${PERMLUIZ_DB_PASSWORD:-permluiz}
    volumes:
      - permluiz-pgdata:/var/lib/postgresql/data
    networks: [luiz-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PERMLUIZ_DB_USER:-permluiz} -d permluiz"]
      interval: 5s
      timeout: 3s
      retries: 20

  permluiz-backend:
    build:
      context: ../perm-luiz/backend
    container_name: permluiz-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://permluiz-db:5432/permluiz
      SPRING_DATASOURCE_USERNAME: ${PERMLUIZ_DB_USER:-permluiz}
      SPRING_DATASOURCE_PASSWORD: ${PERMLUIZ_DB_PASSWORD:-permluiz}
      AUTH_LUIZ_JWKS_URI: http://authluiz-backend:8080/auth/.well-known/jwks.json
      APP_SETUP_MASTER_KEY: ${PERMLUIZ_SETUP_MASTER_KEY}
    ports:
      - "8081:8080"
    depends_on:
      permluiz-db:
        condition: service_healthy
      authluiz-backend:
        condition: service_started
    networks: [luiz-network]

  permluiz-frontend:
    build:
      context: ../perm-luiz/frontend
    container_name: permluiz-frontend
    ports:
      - "81:80"
    depends_on:
      - permluiz-backend
    networks: [luiz-network]

volumes:
  authluiz-pgdata:
  permluiz-pgdata:

networks:
  luiz-network:
    driver: bridge
